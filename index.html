<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕄𝕔ℂ𝕣𝕒𝕔𝕜 Chat</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --bg-0: #060606;
            --bg-1: #0d0d0d;
            --bg-2: #121212;
            --bg-3: #1a1a1a;
            --line-soft: #232323;
            --line-strong: #2c2c2c;
            --text-primary: #f4f4f4;
            --text-muted: #8a8a8a;
            --text-dim: #666;
            --accent: #ffffff;
            --radius-lg: 24px;
            --radius-md: 14px;
            --radius-pill: 999px;
            --shadow-app: 0 45px 100px rgba(0,0,0,0.78);
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.35);
        }

        * { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Roboto, sans-serif; }
        
        /* Global Blurry B&W Gradient Background */
        body, html { 
            width:100%; 
            height:100%; 
            background:
                radial-gradient(circle at 18% 12%, #2e2e2e 0%, transparent 38%),
                radial-gradient(circle at 88% 86%, #1f1f1f 0%, transparent 32%),
                radial-gradient(circle at center, #2b2b2b 0%, #000 70%);
            display:flex; 
            justify-content:center; 
            align-items:center; 
            color: var(--text-primary); 
            overflow: hidden; 
        }
        
        #app { 
            width:98%; 
            max-width:1400px; 
            height:95vh; 
            display:flex; 
            border-radius: var(--radius-lg); 
            overflow:hidden; 
            background: linear-gradient(180deg, rgba(20, 20, 20, 0.95), rgba(14, 14, 14, 0.95));
            box-shadow: var(--shadow-app);
            border: 1px solid var(--line-strong);
            backdrop-filter: blur(14px);
        }
        
        /* Sidebar */
        #sidebar { width:280px; background: linear-gradient(180deg, #0b0b0b 0%, #090909 100%); padding:24px 20px; display:flex; flex-direction:column; gap:14px; border-right: 1px solid var(--line-soft); flex-shrink: 0; }
        
        #sidebar h2 { 
            color: var(--accent); 
            letter-spacing: 2.5px; 
            font-size: 27px; 
            text-align: center; 
            margin-bottom: 8px; 
            font-weight: 900; 
            text-shadow: 0 0 15px rgba(255,255,255,0.18);
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 10px; color: var(--text-dim); font-weight: 700; letter-spacing: 1px; }
        #sidebar input,
        #room-name-input {
            padding: 12px 13px;
            border-radius: 10px;
            border: 1px solid var(--line-strong);
            background: var(--bg-2);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        #sidebar input:focus,
        #room-name-input:focus,
        #message-input:focus {
            border-color: #4a4a4a;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
        }
        
        #sidebar button { padding:12px; border:1px solid var(--line-strong); border-radius:10px; background:#1c1c1c; color:var(--text-primary); cursor:pointer; font-weight:700; transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease; }
        #sidebar button:hover { background:#252525; border-color:#404040; transform: translateY(-1px); }
        #createBtn { background: var(--accent) !important; color: #000 !important; border-color: transparent !important; }
        #createBtn:hover { background: #ececec !important; }

        /* Recent Rooms */
        #recent-rooms-container { margin-top: 26px; display: flex; flex-direction: column; gap: 10px; }
        #recent-rooms-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line-soft); padding-bottom: 6px; }
        #recent-rooms-list { display: flex; flex-direction: column; gap: 6px; }
        .room-history-btn { background: #111 !important; border: 1px solid var(--line-soft) !important; text-align: left !important; font-size: 13px !important; color: var(--text-muted) !important; cursor: pointer; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.01); }
        .room-history-btn:hover { border-color: #4a4a4a !important; color: var(--text-primary) !important; }

        /* Chat Window */
        #chat-area { flex:1; display:flex; flex-direction:column; background: radial-gradient(circle at top, #090909 0%, #000 64%); }
        #room-header { padding: 20px 30px; background: rgba(11, 11, 11, 0.82); border-bottom: 1px solid var(--line-soft); font-weight: 700; color: var(--accent); font-size: 20px; letter-spacing: 0.9px; backdrop-filter: blur(8px); }
        #chat { flex:1; overflow-y:auto; padding:30px; display:flex; flex-direction:column; gap:12px; }
        #chat::-webkit-scrollbar { width: 10px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 10px; }
        #chat::-webkit-scrollbar-thumb:hover { background: #2b2b2b; }
        
        .message { 
            max-width:75%; padding:12px 18px; border-radius:17px; font-size: 14px; 
            background: linear-gradient(180deg, #1a1a1a, #171717); align-self:flex-start; line-height: 1.5; border: 1px solid var(--line-soft); 
            box-shadow: var(--shadow-soft);
        }
        .mine { background: linear-gradient(180deg, #ffffff, #ebebeb); color: #000; align-self:flex-end; border: none; box-shadow: 0 12px 28px rgba(255,255,255,0.13); }
        .mine .msg-info { color: #444; }
        .msg-info { display:block; font-size:10px; font-weight: 700; margin-bottom: 4px; opacity: 0.62; }

        /* Images in chat */
        .chat-img { max-width: 100%; border-radius: 12px; margin-top: 8px; display: block; border: 1px solid var(--line-strong); cursor: zoom-in; }

        /* Typing Indicator Styling */
        #typing-indicator { 
            padding: 0 30px 5px 30px; 
            font-size: 11px; 
            color: var(--text-dim); 
            height: 18px; 
            font-style: italic; 
            background: var(--bg-0); 
        }

        /* Input Area */
        #input-area { display:flex; padding:20px 24px 22px; background: rgba(10, 10, 10, 0.92); gap: 10px; border-top: 1px solid var(--line-soft); align-items: center; }
        #message-input { flex:1; padding:14px 22px; border-radius: var(--radius-pill); border:1px solid var(--line-strong); background:#070707; color:var(--text-primary); outline: none; transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        
        /* Circular Upload Button */
        .action-btn { 
            width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--line-strong); 
            background: #111; color: var(--text-primary); cursor: pointer; font-size: 22px; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s ease, border-color 0.2s ease;
        }
        .action-btn:hover { background: #1d1d1d; border-color: #4b4b4b; }
        
        #sendBtn { padding:0 30px; height: 45px; border-radius: var(--radius-pill); border:none; background:var(--accent); color:#000; cursor:pointer; font-weight:700; transition: transform 0.15s ease, background 0.2s ease; }
        #sendBtn:hover:enabled { transform: translateY(-1px); background: #ececec; }
        #sendBtn:disabled,
        .action-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        /* Modals */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter: blur(10px); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:linear-gradient(180deg, #131313 0%, #0f0f0f 100%); padding:36px; border-radius:24px; width:400px; display:flex; flex-direction:column; gap:18px; border: 1px solid var(--line-strong); text-align: center; box-shadow: var(--shadow-app); }
        .confirm-btn { background:var(--accent); color:#000; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        
        #status-display { margin-top: auto; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
        .status-online { color: #00ff88; }
        .status-offline { color: #ff4444; }

        @media (max-width: 900px) {
            #app { width: 100%; height: 100vh; border-radius: 0; }
            #sidebar { width: 250px; padding: 20px 16px; }
            #chat, #room-header { padding-left: 18px; padding-right: 18px; }
            #input-area { padding: 14px 16px 16px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <h2>𝕄𝕔ℂ𝕣𝕒𝕔𝕜</h2>
        <div class="input-group">
            <label>USERNAME</label>
            <input id="user-display-name" placeholder="Enter name...">
        </div>
        <hr style="border: 0; border-top: 1px solid #222; margin: 10px 0;">
        <button id="createBtn">Create New Room</button>
        <button id="joinBtn">Join Room</button>
        
        <div id="recent-rooms-container">
            <div id="recent-rooms-header">
                <label style='font-size:10px; color:#555; font-weight:bold;'>MY ROOMS</label>
                <span onclick="clearRecentRooms()" style="font-size:10px; color:#f44; cursor:pointer;">CLEAR</span>
            </div>
            <div id="recent-rooms-list"></div>
        </div>

        <div id="status-display" class="status-offline">System: Connecting...</div>
    </div>
    
    <div id="chat-area">
        <div id="room-header">Welcome to 𝕄𝕔ℂ𝕣𝕒𝕔𝕜 Chat</div>
        <div id="chat"></div>
        <div id="typing-indicator"></div>
        <div id="input-area">
            <input type="file" id="fileInput" accept="image/*" style="display:none">
            <button class="action-btn" id="uploadBtn" disabled>+</button>
            <input id="message-input" placeholder="Join a room..." disabled>
            <button id="sendBtn" disabled>Send</button>
        </div>
    </div>
</div>

<div id="room-modal" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="color:#fff">Room</h3>
        <input id="room-name-input" placeholder="Room name...">
        <button id="confirmRoomBtn" class="confirm-btn">Confirm & Enter</button>
        <button onclick="closeModal()" style="background:transparent; color:#555; border:none; cursor:pointer;">Cancel</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = "https://agcrweayleevlkgcmqpy.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFnY3J3ZWF5bGVldmxrZ2NtcXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MzI5ODcsImV4cCI6MjA4NzEwODk4N30.6ROZmRjDORSrfHP9yeZ_ofRHueHnq5K-C9c_jjxqBwQ";
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let activeRoom = "";
    let myUsername = "";
    let chatChannel = null;
    let typingTimeout = null;

    const chatBox = document.getElementById("chat");
    const msgInput = document.getElementById("message-input");
    const sendBtn = document.getElementById("sendBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");
    const statusDisplay = document.getElementById("status-display");
    const roomModal = document.getElementById("room-modal");
    const roomInput = document.getElementById("room-name-input");
    const nameInput = document.getElementById("user-display-name");
    const recentRoomsList = document.getElementById("recent-rooms-list");
    const typingIndicator = document.getElementById("typing-indicator");

    function renderRecentRooms() {
        const savedRooms = JSON.parse(localStorage.getItem("myRooms") || "[]");
        recentRoomsList.innerHTML = "";
        savedRooms.forEach(roomName => {
            const btn = document.createElement("button");
            btn.className = "room-history-btn";
            btn.innerText = "# " + roomName;
            btn.onclick = () => {
                roomInput.value = roomName;
                if (nameInput.value.trim() !== "") {
                    window.modalMode = "join";
                    document.getElementById("confirmRoomBtn").click();
                } else {
                    openModal("Join Room", "join");
                    roomInput.value = roomName;
                }
            };
            recentRoomsList.appendChild(btn);
        });
    }

    function saveRoomLocally(roomName) {
        let savedRooms = JSON.parse(localStorage.getItem("myRooms") || "[]");
        savedRooms = savedRooms.filter(r => r !== roomName);
        savedRooms.unshift(roomName);
        if(savedRooms.length > 5) savedRooms.pop();
        localStorage.setItem("myRooms", JSON.stringify(savedRooms));
        renderRecentRooms();
    }

    function clearRecentRooms() { localStorage.removeItem("myRooms"); renderRecentRooms(); }

    renderRecentRooms();

    async function checkSystem() {
        try {
            const { error } = await _supabase.from('rooms').select('name').limit(1);
            if(!error) {
                statusDisplay.innerText = "System: Online";
                statusDisplay.className = "status-online";
            }
        } catch (e) { statusDisplay.className = "status-offline"; }
    }
    checkSystem();

    function openModal(title, mode) {
        window.modalMode = mode;
        document.getElementById("modal-title").innerText = title;
        roomModal.style.display = "flex";
        roomInput.focus();
    }

    function closeModal() { roomModal.style.display = "none"; roomInput.value = ""; }

    document.getElementById("createBtn").onclick = () => openModal("Create Room", "create");
    document.getElementById("joinBtn").onclick = () => openModal("Join Room", "join");

    document.getElementById("confirmRoomBtn").onclick = async () => {
        const r = roomInput.value.trim().toLowerCase();
        const u = nameInput.value.trim();
        if(!r || !u) return;

        try {
            if (window.modalMode === "create") {
                await _supabase.from('rooms').insert([{ name: r }]);
            } else {
                const { data } = await _supabase.from('rooms').select('*').eq('name', r).maybeSingle();
                if (!data) { alert("Room not found!"); return; }
            }
            saveRoomLocally(r);
            activeRoom = r;
            myUsername = u;
            document.getElementById("room-header").innerText = "# " + r;
            msgInput.disabled = false;
            sendBtn.disabled = false;
            uploadBtn.disabled = false;
            closeModal();
            connectToRoom();
        } catch (err) { alert("Error: " + err.message); }
    };

    async function connectToRoom() {
        chatBox.innerHTML = "<p style='text-align:center; opacity:0.3; margin-top:20px;'>Syncing...</p>";
        const { data } = await _supabase.from("messages").select("*").eq("room", activeRoom).order("created_at", { ascending: true });
        chatBox.innerHTML = "";
        if (data) data.forEach(msg => addMessage(msg));

        if(chatChannel) await _supabase.removeChannel(chatChannel);
        
        chatChannel = _supabase.channel(`room_${activeRoom}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room=eq.${activeRoom}` }, 
                payload => addMessage(payload.new)
            )
            .on('broadcast', { event: 'typing' }, payload => {
                if (payload.payload.user !== myUsername) {
                    typingIndicator.innerText = `${payload.payload.user} is typing...`;
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => { typingIndicator.innerText = ""; }, 2000);
                }
            })
            .subscribe();
    }

    function addMessage(msg) {
        const div = document.createElement("div");
        const isMe = msg.username === myUsername;
        div.className = `message ${isMe ? 'mine' : ''}`;
        
        let content = msg.content;
        
        // Image Detection Logic
        const isUrl = content.startsWith("http");
        const hasImgExt = /\.(png|jpg|jpeg|gif|webp)/i.test(content);
        const isStoragePath = content.includes("chat-images");

        if (isUrl && (hasImgExt || isStoragePath)) {
            content = `<img src="${content}" class="chat-img" onclick="window.open('${content}')">`;
        }

        div.innerHTML = `<span class="msg-info">${msg.username}</span>${content}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Typing Event Trigger
    msgInput.oninput = () => {
        if (chatChannel) {
            chatChannel.send({
                type: 'broadcast',
                event: 'typing',
                payload: { user: myUsername }
            });
        }
    };

    // Upload functionality
    uploadBtn.onclick = () => fileInput.click();
    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        uploadBtn.innerText = "...";
        const fileExt = file.name.split('.').pop();
        const fileName = `${Math.random()}.${fileExt}`;
        const filePath = `${activeRoom}/${fileName}`;

        try {
            const { data, error } = await _supabase.storage
                .from('chat-images')
                .upload(filePath, file);

            if (error) throw error;

            const { data: urlData } = _supabase.storage
                .from('chat-images')
                .getPublicUrl(filePath);

            await _supabase.from("messages").insert([{ 
                room: activeRoom, 
                username: myUsername, 
                content: urlData.publicUrl 
            }]);
        } catch (err) {
            alert("Upload failed: " + err.message);
        } finally {
            uploadBtn.innerText = "+";
            fileInput.value = "";
        }
    };

    async function send() {
        const text = msgInput.value.trim();
        if(!text) return;
        msgInput.value = "";
        await _supabase.from("messages").insert([{ room: activeRoom, username: myUsername, content: text }]);
    }

    sendBtn.onclick = send;
    msgInput.onkeypress = (e) => { if(e.key === "Enter") send(); };
</script>
</body>
</html>
